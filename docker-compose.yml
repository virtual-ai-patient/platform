services:
  postgres:
    image: postgres:17-alpine
    container_name: virtual-ai-patient-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtual-ai-patient-backend
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to reach postgres via the Docker service name.
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      PYTHONUNBUFFERED: "1"
      # Defaults match backend/config.py when unset (avoids Compose "variable is not set" warnings).
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      EDUCATOR_USERNAME: ${EDUCATOR_USERNAME:-educator}
      EDUCATOR_EMAIL: ${EDUCATOR_EMAIL:-educator@example.com}
      EDUCATOR_PASSWORD: ${EDUCATOR_PASSWORD:-changeme}
      LEARNER_USERNAME: ${LEARNER_USERNAME:-user}
      LEARNER_EMAIL: ${LEARNER_EMAIL:-user@example.com}
      LEARNER_PASSWORD: ${LEARNER_PASSWORD:-changeme}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: virtual-ai-patient-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      # For Flutter web, configure backend URL at build time if needed.
      # Example:
      #   flutter build web --dart-define=BACKEND_BASE_URL=http://localhost:8000
      # This is handled in the Dockerfile build stage, not via runtime env.
      BACKEND_BASE_URL: "http://backend:8000"
    restart: unless-stopped

  # bot:
  #   build:
  #     context: ./bot
  #     dockerfile: Dockerfile
  #   container_name: virtual-ai-patient-bot
  #   depends_on:
  #     - backend
  #   environment:
  #     TELEGRAM_BOT_TOKEN: "REPLACE_WITH_REAL_TOKEN"
  #     BACKEND_BASE_URL: "http://backend:8000"
  #     BACKEND_USERNAME: "admin"
  #     BACKEND_PASSWORD: "password"
  #   restart: unless-stopped

volumes:
  postgres_data:
