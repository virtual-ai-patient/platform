services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtual-ai-patient-backend
    ports:
      - "8000:8000"
    environment:
      # Adjust these as needed; for now hard-coded demo credentials.
      # BACKEND_USERNAME: admin
      # BACKEND_PASSWORD: password
      # SECRET_KEY: override via env or keep default in code
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: virtual-ai-patient-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      # For Flutter web, configure backend URL at build time if needed.
      # Example:
      #   flutter build web --dart-define=BACKEND_BASE_URL=http://localhost:8000
      # This is handled in the Dockerfile build stage, not via runtime env.
      BACKEND_BASE_URL: "http://backend:8000"
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: virtual-ai-patient-bot
    depends_on:
      - backend
    environment:
      TELEGRAM_BOT_TOKEN: "REPLACE_WITH_REAL_TOKEN"
      BACKEND_BASE_URL: "http://backend:8000"
      BACKEND_USERNAME: "admin"
      BACKEND_PASSWORD: "password"
    restart: unless-stopped

