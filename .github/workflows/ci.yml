name: Monorepo CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_all:
        description: "Run all component workflows regardless of changed files"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      bot: ${{ steps.filter.outputs.bot }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
            bot:
              - 'bot/**'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - '.github/workflows/**'
              - '.markdownlint.jsonc'
              - '.markdownlint-cli2.jsonc'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_all)
    uses: ./.github/workflows/backend-quality.yml

  bot:
    needs: changes
    if: needs.changes.outputs.bot == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_all)
    uses: ./.github/workflows/bot-quality.yml

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_all)
    uses: ./.github/workflows/frontend-quality.yml

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_all)
    uses: ./.github/workflows/docs-quality.yml

