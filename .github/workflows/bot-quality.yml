name: Bot Quality

on:
  workflow_call:

jobs:
  bot-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.0-alpha.4"
          allow-prereleases: true

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Lint (Ruff)
        run: uv pip install --system ruff && ruff check .

      - name: Type check (MyPy)
        run: uv pip install --system mypy && mypy .

      - name: Tests
        run: uv pip install --system pytest && pytest -q

      - name: Build Docker image
        run: docker build -t virtual-ai-patient-bot:ci .

