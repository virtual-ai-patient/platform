name: Docs Quality

on:
  workflow_call:

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: docs/.markdownlint-cli2.jsonc
          globs: |
            docs/**/*.md

